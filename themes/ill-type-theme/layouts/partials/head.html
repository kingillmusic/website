<meta property="og:title" content="Purchase beats, create playlists and stream ad-free: experimental, trap, EDM & chill study music">

<link rel="preload" href="{{ "css/style.css" | relURL }}" as="style">

<title>{{ .Site.Title | lower }}</title>

{{ with .Site.Params.favicon }}<link rel="icon" href="{{ . }}">{{ end -}}

<script type="module" src="{{ $music.RelPermalink }}"></script>
