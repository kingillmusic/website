<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="robots" content="index, follow">
<meta name="description" content="Stream experimental, trap, EDM, and chill study music with no ads, fast loading and easy access.">
<meta name="keywords" content="music streaming, trap, EDM, chill study music, experimental music">

<meta property="og:title" content="Stream Music, Ad-Free | Experimental, Trap, EDM & Chill">
<meta property="og:description" content="Stream experimental, trap, EDM, and chill study music with no ads, fast loading and easy access.">
<!--meta property="og:image" content="https://kingillmusic.com/cover.jpg"-->
<meta property="og:url" content="https://kingillmusic.com">
<meta property="og:type" content="website">

{{ $worker := resources.Get "js/list/waveform-worker.js" | js.Build | minify | fingerprint }}
<script>window.WAVEFORM_WORKER_URL = "{{ $worker.RelPermalink }}";</script>

{{ $js := resources.Get "js/list/main.js" | js.Build | minify | fingerprint }}
<script type="text/javascript" src="{{ $js.RelPermalink }}" defer></script>

<link rel="stylesheet preload" as="style" type="text/css" href="/css/style.css">

<title>{{ .Site.Title | lower }}</title>
{{ if isset .Params "tags" }}<meta name="keywords" content="{{ with .Params.tags }}{{ delimit . ", " }}{{ end }}">{{ end -}}
{{ with .Site.Params.favicon }}<link rel="icon" href="{{ . }}">{{ end -}}
