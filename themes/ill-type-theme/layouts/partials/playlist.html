<div id="playlist-modal" class="modal-overlay" style="display: none;">
  <div class="modal-dialog">
    <h2>Add to Playlist</h2>
    <input type="text" id="new-playlist-name" placeholder="Playlist name…" maxlength="30" autocomplete="off">
    <button id="create-playlist-btn">Create &amp; Add</button>
    <span id="existing-label" style="display:none;"></span>
    <div id="playlist-list" class="playlist-scroll"></div>
    <div class="modal-actions">
      <small><a href="#" id="show-all-tracks-link" style="display:none;">Show All Tracks</a></small>
    </div>
  </div>
</div>
